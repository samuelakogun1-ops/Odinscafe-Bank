<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #020617; color: white; margin: 0; }
        .sidebar { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 24px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <aside class="sidebar w-full lg:w-72 p-6 flex flex-col lg:h-screen">
        <h2 class="text-xl font-black italic mb-10">ODIN<span class="text-amber-500">CORE</span></h2>
        
        <nav class="space-y-4">
            <a href="admin management terminal.html" class="block text-amber-500 font-bold text-xs uppercase tracking-widest">Dashboard</a>
            <!-- FIXED LINK: Added %20 for spaces to match GitHub requirement -->
            <a href="ACCOUNT%20MANAGEMENT.html" class="block text-slate-400 font-bold text-xs uppercase tracking-widest hover:text-white">Account Matrix</a>
            <a href="transactions%20history%20page.html" class="block text-slate-400 font-bold text-xs uppercase tracking-widest hover:text-white">Global Ledger</a>
        </nav>
    </aside>

    <main class="flex-grow p-10">
        <h1 class="text-3xl font-black italic mb-10">COMMAND <span class="text-amber-500">CENTER</span></h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="stat-card">
                <p class="text-xs text-slate-500 font-bold uppercase">Total Assets</p>
                <h3 class="text-2xl font-black text-amber-500">$1,240,000,000</h3>
            </div>
            <div class="stat-card">
                <p class="text-xs text-slate-500 font-bold uppercase">Status</p>
                <h3 class="text-2xl font-black text-green-500">ENCRYPTED</h3>
            </div>
            <div class="stat-card">
                <p class="text-xs text-slate-500 font-bold uppercase">Alerts</p>
                <h3 class="text-2xl font-black">0</h3>
            </div>
        </div>
    </main>

</body>
</html>
