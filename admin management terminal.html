<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic">COMMAND <span class="text-amber-500">CENTER</span></h1>
            <div class="bg-slate-900 p-4 rounded-xl border border-white/5">
                <p class="text-xs text-slate-500 uppercase font-bold">Logged in as</p>
                <p class="font-bold">ADMIN-ODIN</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card">
                <p class="text-xs text-slate-400 uppercase font-bold">Total Assets</p>
                <h2 class="text-3xl font-black text-amber-500">$1,240,000,000</h2>
            </div>
            <div class="stat-card">
                <p class="text-xs text-slate-400 uppercase font-bold">Security Status</p>
                <h2 class="text-3xl font-black text-green-500">ENCRYPTED</h2>
            </div>
            <div class="stat-card">
                <p class="text-xs text-slate-400 uppercase font-bold">Pending Wires</p>
                <h2 class="text-3xl font-black">14</h2>
            </div>
        </div>

        <div class="bg-slate-900/50 rounded-3xl p-8 border border-white/5">
            <h3 class="text-xl font-bold mb-6">Live System Log</h3>
            <div class="space-y-4 opacity-70 font-mono text-sm">
                <p>> System initialized...</p>
                <p>> Firewall active on node: US-EAST-01</p>
                <p>> Waiting for transaction synchronization...</p>
            </div>
        </div>
    </div>
</body>
</html>
