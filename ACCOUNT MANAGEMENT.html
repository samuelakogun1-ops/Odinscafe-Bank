<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Account Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; }
        .sidebar { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-table { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-active { color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .status-flagged { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .modal-bg { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <!-- Sidebar (Same as Terminal for consistency) -->
    <aside class="sidebar w-full lg:w-72 flex-shrink-0 flex flex-col p-6 lg:h-screen sticky top-0 z-40">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
            </div>
            <div>
                <h2 class="text-lg font-black italic tracking-tighter uppercase">ODINCORE</h2>
                <p class="text-[9px] text-amber-500/70 font-bold uppercase tracking-[0.2em]">Federal Admin</p>
            </div>
        </div>

        <nav class="space-y-2 flex-grow">
            <a href="terminal.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 bg-amber-500/10 text-amber-500 rounded-xl font-bold text-xs uppercase tracking-widest border border-amber-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                Accounts
            </a>
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-4 px-4 py-3 text-red-400 hover:bg-red-400/10 rounded-xl font-bold text-xs uppercase tracking-widest transition-all mt-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                Sign Out
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-10">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter">Account <span class="text-amber-500 italic">Matrix</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Institutional Ledger Control</p>
            </div>
            <button onclick="openModal('add')" class="bg-amber-500 hover:bg-amber-400 text-slate-900 px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-amber-500/20 transition-all active:scale-95">
                Register New Account
            </button>
        </header>

        <!-- Account Table -->
        <div class="glass-table rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-white/5 bg-white/5">
                            <th class="px-8 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Client Name</th>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Status</th>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Asset Balance</th>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-right">Protocol</th>
                        </tr>
                    </thead>
                    <tbody id="account-list" class="divide-y divide-white/5">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Management Modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 modal-bg">
        <div class="bg-slate-900 w-full max-w-md rounded-[2.5rem] p-10 border border-white/10 shadow-3xl">
            <h2 id="modal-title" class="text-2xl font-extrabold tracking-tighter mb-8">Edit <span class="text-amber-500 italic">Profile</span></h2>
            
            <div class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1">Client Full Name</label>
                    <input type="text" id="m-name" class="w-full bg-black border border-slate-800 rounded-xl px-5 py-4 outline-none focus:border-amber-500 text-sm font-semibold">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1">Asset Value (USD)</label>
                    <input type="number" id="m-balance" class="w-full bg-black border border-slate-800 rounded-xl px-5 py-4 outline-none focus:border-amber-500 text-sm font-mono font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1">Security Status</label>
                    <select id="m-status" class="w-full bg-black border border-slate-800 rounded-xl px-5 py-4 outline-none focus:border-amber-500 text-sm font-bold">
                        <option value="Active">Operational / Active</option>
                        <option value="Flagged">Suspended / Flagged</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 mt-10">
                <button onclick="closeModal()" class="flex-1 py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold text-[10px] uppercase tracking-widest">Cancel</button>
                <button onclick="saveChanges()" class="flex-1 py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 font-black rounded-xl text-[10px] uppercase tracking-widest">Commit Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Initial Mock Data
        let accounts = [
            { id: 1, name: "Alexander Vane", balance: 2540000, status: "Active" },
            { id: 2, name: "Elena Rodriguez", balance: 840500, status: "Active" },
            { id: 3, name: "Unknown Entity #404", balance: 0, status: "Flagged" }
        ];

        let currentEditingId = null;

        function renderAccounts() {
            const list = document.getElementById('account-list');
            list.innerHTML = accounts.map(acc => `
                <tr class="hover:bg-white/5 transition-colors group">
                    <td class="px-8 py-6">
                        <p class="font-bold text-sm tracking-tight">${acc.name}</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mono mt-1">ID: ODN-99${acc.id}</p>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${acc.status === 'Active' ? 'status-active' : 'status-flagged'}">
                            ${acc.status}
                        </span>
                    </td>
                    <td class="px-8 py-6 font-mono font-bold text-sm text-amber-500">
                        $${acc.balance.toLocaleString()}
                    </td>
                    <td class="px-8 py-6 text-right">
                        <button onclick="openModal('edit', ${acc.id})" class="text-[9px] font-black text-slate-400 hover:text-white uppercase tracking-widest border border-slate-800 px-3 py-2 rounded-lg hover:border-amber-500 transition-all">
                            Modify
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(type, id = null) {
            currentEditingId = id;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            
            if (type === 'edit') {
                const acc = accounts.find(a => a.id === id);
                document.getElementById('m-name').value = acc.name;
                document.getElementById('m-balance').value = acc.balance;
                document.getElementById('m-status').value = acc.status;
                title.innerHTML = `Edit <span class="text-amber-500 italic">Profile</span>`;
            } else {
                document.getElementById('m-name').value = '';
                document.getElementById('m-balance').value = '';
                document.getElementById('m-status').value = 'Active';
                title.innerHTML = `Register <span class="text-amber-500 italic">Account</span>`;
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function saveChanges() {
            const name = document.getElementById('m-name').value;
            const balance = parseInt(document.getElementById('m-balance').value);
            const status = document.getElementById('m-status').value;

            if (currentEditingId) {
                const index = accounts.findIndex(a => a.id === currentEditingId);
                accounts[index] = { ...accounts[index], name, balance, status };
            } else {
                accounts.push({
                    id: accounts.length + 1,
                    name,
                    balance,
                    status
                });
            }
            renderAccounts();
            closeModal();
        }

        renderAccounts();
    </script>
</body>
</html>
