<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Account Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; }
        .sidebar { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-panel { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-link { transition: all 0.2s ease; }
        .nav-link:hover { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <!-- Sidebar with Fixed Links -->
    <aside class="sidebar w-full lg:w-72 flex-shrink-0 flex flex-col p-6 lg:h-screen sticky top-0 z-40">
        <div class="mb-10">
            <h2 class="text-xl font-black italic tracking-tighter">ODIN<span class="text-amber-500">CORE</span></h2>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em]">Institutional Admin</p>
        </div>

        <nav class="space-y-2 flex-grow">
            <!-- FIXED LINK: Matches your GitHub filename exactly -->
            <a href="admin management terminal.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 font-bold text-xs uppercase tracking-widest">
                Dashboard
            </a>
            
            <a href="ACCOUNT%20MANAGEMENT.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-500/10 text-amber-500 border border-amber-500/20 font-bold text-xs uppercase tracking-widest">
                Account Matrix
            </a>

            <a href="transactions%20history%20page.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 font-bold text-xs uppercase tracking-widest">
                Global Ledger
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-6 lg:p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">ACCOUNT <span class="text-amber-500">MATRIX</span></h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">Management Console</p>
            </div>
        </header>

        <div class="glass-panel rounded-[2.5rem] p-10">
            <p class="text-slate-400 text-sm mb-6">Select a user profile to manage security credentials or modify balances.</p>
            <!-- User table placeholder -->
            <div class="border-t border-white/5 pt-6">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl mb-4">
                    <span class="font-bold">Alexander Vane</span>
                    <button class="text-amber-500 text-xs font-bold uppercase">Manage</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
