<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Admin Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 20% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 40%);
        }
        .auth-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }
        .custom-input {
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: #fbbf24;
            background: rgba(2, 6, 23, 0.9);
        }
    </style>
</head>
<body class="p-6">

    <div class="w-full max-w-[480px] auth-container rounded-[2.5rem] p-10 md:p-16 relative">
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-amber-500 rounded-2xl mb-6 shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter uppercase italic">OdinCore <span class="text-amber-500">Admin</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-2">Secure Federal Gateway</p>
        </div>

        <div id="auth-interface" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Admin ID</label>
                <input type="text" id="staff-id" placeholder="ADMIN-ODIN" class="custom-input w-full px-6 py-4 rounded-2xl outline-none text-white font-mono uppercase text-sm">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Passcode</label>
                <input type="password" id="passcode" placeholder="••••••••" class="custom-input w-full px-6 py-4 rounded-2xl outline-none text-white font-mono text-sm">
            </div>

            <button onclick="processLogin()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-xs shadow-xl">
                Authorize Session
            </button>
            
            <p id="error-msg" class="hidden text-red-500 text-[10px] font-bold uppercase text-center mt-4 tracking-widest">Access Denied</p>
        </div>

        <div id="system-loading" class="hidden py-10 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent mx-auto mb-6"></div>
            <p class="text-amber-500 font-mono text-[10px] uppercase tracking-[0.3em] font-bold">Bypassing Firewall...</p>
            <!-- Manual link if redirect fails -->
            <a id="manual-link" href="admin management terminal.html" class="hidden mt-8 text-white underline text-[10px] block opacity-50">Manual Entry (Click here if screen stays stuck)</a>
        </div>
    </div>

    <script>
        function processLogin() {
            const id = document.getElementById('staff-id').value.trim().toUpperCase();
            const pass = document.getElementById('passcode').value.trim();
            const error = document.getElementById('error-msg');
            const ui = document.getElementById('auth-interface');
            const loader = document.getElementById('system-loading');

            if (id === 'ADMIN-ODIN' && pass === 'ODIN-SECURE-2026') {
                error.classList.add('hidden');
                ui.classList.add('hidden');
                loader.classList.remove('hidden');

                // Wait 2 seconds then try to redirect
                setTimeout(() => {
                    // Show manual link in case browser blocks automatic redirect
                    document.getElementById('manual-link').classList.remove('hidden');
                    // Correcting path to match your exact GitHub filename with spaces
                    window.location.href = "admin management terminal.html";
                }, 2000);
            } else {
                error.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
