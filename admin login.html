<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        .card { background: rgba(15, 23, 42, 0.8); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="text-2xl font-bold mb-6 italic uppercase">Admin <span class="text-amber-500">Login</span></h1>
        <div class="space-y-4">
            <input type="text" id="id" placeholder="Admin ID" class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none focus:border-amber-500">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none focus:border-amber-500">
            <button onclick="login()" class="w-full bg-amber-500 text-black font-bold py-4 rounded-xl">ENTER TERMINAL</button>
        </div>
    </div>
    <script>
        function login() {
            const u = document.getElementById('id').value;
            const p = document.getElementById('pass').value;
            if(u === 'ADMIN-ODIN' && p === 'ODIN-SECURE-2026') {
                window.location.href = "admin management terminal.html";
            } else { alert('Access Denied'); }
        }
    </script>
</body>
</html>
