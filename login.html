<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(30, 58, 138, 0.1) 0%, transparent 40%);
        }
        .auth-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }
        .input-group:focus-within label {
            color: #fbbf24;
        }
        .custom-input {
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .custom-input:focus {
            border-color: #fbbf24;
            background: rgba(2, 6, 23, 0.9);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.05);
        }
    </style>
</head>
<body class="p-6">

    <div class="w-full max-w-[480px] auth-container rounded-[2.5rem] p-10 md:p-16 relative overflow-hidden">
        <!-- Top Branding -->
        <div class="text-center mb-12">
            <div onclick="window.location.href='index.html'" class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-amber-500 to-amber-600 rounded-2xl mb-6 cursor-pointer shadow-2xl shadow-amber-500/20 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-900 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter uppercase italic">OdinCore <span class="text-amber-500">Federal</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-2">Access Control Management</p>
        </div>

        <!-- Form Interface -->
        <div id="auth-interface" class="space-y-8">
            <div class="space-y-6">
                <div class="input-group space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 transition-colors">Identification ID</label>
                    <input type="text" id="staff-id" autocomplete="off" placeholder="Enter ID" class="custom-input w-full px-6 py-4 rounded-2xl outline-none text-white font-mono uppercase text-sm">
                </div>

                <div class="input-group space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 transition-colors">Authorization Key</label>
                    <input type="password" id="passcode" placeholder="••••••••" class="custom-input w-full px-6 py-4 rounded-2xl outline-none text-white font-mono text-sm">
                </div>
            </div>

            <div class="pt-4">
                <button onclick="processLogin()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black py-5 rounded-2xl transition-all active:scale-95 uppercase tracking-widest text-xs shadow-xl shadow-amber-500/20">
                    Verify Identity
                </button>
                <div id="error-feedback" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl">
                    <p class="text-red-500 text-[10px] font-black uppercase text-center tracking-widest">Protocol Error: Access Denied</p>
                </div>
            </div>
        </div>

        <!-- System Processing UI -->
        <div id="system-loading" class="hidden py-10 text-center">
            <div class="relative w-16 h-16 mx-auto mb-6">
                <div class="absolute inset-0 rounded-full border-4 border-amber-500/20"></div>
                <div class="absolute inset-0 rounded-full border-4 border-amber-500 border-t-transparent animate-spin"></div>
            </div>
            <p class="text-amber-500 font-mono text-[10px] uppercase tracking-[0.3em] font-bold">Establishing Secure Link...</p>
        </div>

        <!-- Bottom Security Footer -->
        <div class="mt-12 pt-8 border-t border-white/5 flex flex-col items-center gap-4">
            <div class="flex items-center gap-2 text-[9px] font-bold text-slate-600 uppercase tracking-widest">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                Network Status: Encrypted
            </div>
            <p class="text-[8px] text-slate-700 font-bold uppercase tracking-[0.2em] text-center">Unauthorized access attempt is a federal offense</p>
        </div>
    </div>

    <script>
        function processLogin() {
            const id = document.getElementById('staff-id').value.trim().toUpperCase();
            const pass = document.getElementById('passcode').value.trim();
            const error = document.getElementById('error-feedback');
            const ui = document.getElementById('auth-interface');
            const loader = document.getElementById('system-loading');

            if (id === 'ADMIN-ODIN' && pass === 'ODIN-SECURE-2026') {
                error.classList.add('hidden');
                ui.classList.add('hidden');
                loader.classList.remove('hidden');

                // Redirect to terminal.html
                setTimeout(() => {
                    window.location.href = "terminal.html";
                }, 1800);
            } else {
                error.classList.remove('hidden');
                document.getElementById('passcode').value = '';
                // Shake effect on error
                const container = document.querySelector('.auth-container');
                container.classList.add('translate-x-1');
                setTimeout(() => container.classList.remove('translate-x-1'), 100);
            }
        }
    </script>
</body>
</html>
